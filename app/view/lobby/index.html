<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>中国象棋 · 大厅</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #f4e4bc 0%, #d4a574 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff8e7;
    padding: 48px 56px;
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    text-align: center;
    max-width: 480px;
    width: 100%;
  }
  h1 { font-size: 28px; color: #5a2d0c; margin-bottom: 8px; }
  .subtitle { color: #8a5a2b; margin-bottom: 32px; font-size: 14px; }
  label { display: block; text-align: left; font-size: 13px; color: #5a2d0c; margin-bottom: 6px; }
  input[type=text] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #d4a574;
    border-radius: 6px;
    background: #fff;
    font-size: 14px;
    margin-bottom: 20px;
    outline: none;
  }
  input[type=text]:focus { border-color: #c53d2f; }
  button {
    width: 100%;
    padding: 14px;
    background: #c53d2f;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #a8311f; }
  button:disabled { background: #bbb; cursor: not-allowed; }
  .hint { margin-top: 20px; font-size: 12px; color: #999; }
</style>
</head>
<body>
  <div class="card">
    <h1>中国象棋</h1>
    <p class="subtitle">创建对局后,将链接发给好友即可开始对弈</p>
    <label for="nickname">昵称(可选)</label>
    <input id="nickname" type="text" maxlength="12" placeholder="留空将自动分配">
    <button id="create">创建对局</button>
    <p class="hint">每步思考时间 20 秒,超时将自动随机走子</p>
  </div>
<script>
  const btn = document.getElementById('create');
  const nick = document.getElementById('nickname');
  btn.addEventListener('click', async () => {
    btn.disabled = true;
    btn.textContent = '创建中...';
    try {
      const r = await fetch('/api/game', { method: 'POST' });
      const data = await r.json();
      if (data.code === 0) {
        const n = nick.value.trim();
        if (n) localStorage.setItem('chess_nick', n);
        location.href = data.url;
      } else {
        alert('创建失败');
        btn.disabled = false;
        btn.textContent = '创建对局';
      }
    } catch (e) {
      alert('网络错误: ' + e.message);
      btn.disabled = false;
      btn.textContent = '创建对局';
    }
  });
  const saved = localStorage.getItem('chess_nick');
  if (saved) nick.value = saved;
</script>
</body>
</html>
